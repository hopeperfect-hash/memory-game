<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful and modern memory matching game where players flip tiles to find matching pairs.">
    <title>Memory Match Experience</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Top mobile app-like Header -->
        <header class="app-header">
            <div class="header-left">
                <button id="back-btn" class="circ-btn">←</button>
            </div>
            <div class="header-center">
                <div id="level-title" class="title-main">Level 1</div>
                <div id="level-subtitle" class="title-sub">Cute Puppies</div>
            </div>
            <div class="header-right">
                <div class="pill-stat">
                    <span class="timer-icon">⏱️</span>
                    <span id="timer">00:00</span>
                    <span class="divider">|</span>
                    <span class="moves-icon">📄</span>
                    <span id="moves-top">0</span>
                </div>
                <button id="pause-btn" class="circ-btn">⏸</button>
            </div>
        </header>

        <!-- Centered Scoreboard -->
        <section class="banner-scoreboard">
            <div class="board-column">
                <span class="board-label">BEST MOVES</span>
                <span id="best-moves" class="board-value">0</span>
            </div>
            <div class="board-column">
                <span class="board-label">TOTAL MATCHES</span>
                <span id="score" class="board-value">0 / 2</span>
            </div>
        </section>

        <main class="game-board-container">
            <div id="game-board" class="grid-4x4">
                <!-- Tiles will be dynamically injected here by JS -->
            </div>
        </main>

        <!-- Game Control Footer -->
        <footer class="game-footer">
            <button id="restart-btn-footer" class="primary-btn-restart">
                <span class="icon-refresh">🔄</span> Restart Game
            </button>
            <button id="settings-btn" class="circ-btn settings-btn">⚙️</button>
        </footer>

        <!-- Bottom Tab Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" id="nav-play">
                <span class="nav-icon">🎮</span>
                <span class="nav-label">Play</span>
            </button>
            <button class="nav-item" id="nav-stats">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Stats</span>
            </button>
            <button class="nav-item" id="nav-settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </button>
        </nav>

        <!-- Win Modal Overlay -->
        <div id="win-modal" class="modal-overlay hidden">
            <div class="modal-content glass-panel">
                <h2 class="glow-text-success">Brilliant!</h2>
                <p>You found all matching pairs in <span id="final-moves" class="highlight">0</span> moves.</p>
                <button id="play-again-btn" class="glass-button cta">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Background decorative elements -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <script src="script.js"></script>
</body>
</html>
