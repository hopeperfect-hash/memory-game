<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful and modern memory matching game where players flip tiles to find matching pairs.">
    <title>Memory Match Experience</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <header class="game-header glow-text">
            <h1>Memory Match</h1>
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">Pairs Matched</span>
                    <span class="stat-value" id="score">0 / 8</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Moves</span>
                    <span class="stat-value" id="moves">0</span>
                </div>
            </div>
            <button id="restart-btn" class="glass-button">Restart Game</button>
        </header>

        <main class="game-board-container">
            <div id="game-board" class="grid-4x4">
                <!-- Tiles will be dynamically injected here by JS -->
            </div>
        </main>

        <!-- Win Modal Overlay -->
        <div id="win-modal" class="modal-overlay hidden">
            <div class="modal-content glass-panel">
                <h2 class="glow-text-success">Brilliant!</h2>
                <p>You found all matching pairs in <span id="final-moves" class="highlight">0</span> moves.</p>
                <button id="play-again-btn" class="glass-button cta">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Background decorative elements -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <script src="script.js"></script>
</body>
</html>
